<script async src="https://a.magsrv.com/ad-provider.js"></script>

<style>
  .sticky-ad {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;

    width: 300px;
    height: 250px;

    background: transparent;
    animation: slideUp .4s ease-out both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateX(-50%) translateY(30px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .sticky-close {
    position: absolute;

    /* botão fora do anúncio */
    top: -10px;
    right: -10px;

    z-index: 10000;
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    font-size: 13px;
    line-height: 22px;
    text-align: center;
    cursor: pointer;
    padding: 0;
    transition: background .2s;
  }

  .sticky-close:hover {
    background: #e60000;
  }

  .sticky-ad ins {
    display: block;
    width: 300px;
    height: 250px;
  }

  @media (max-width: 600px) {
    .sticky-ad {
      width: 160px;
      height: 133px;
      bottom: 8px;
      left: auto;
      right: 8px;
      transform: none;
      background: transparent;
      animation: slideUpMobile .4s ease-out both;
    }

    @keyframes slideUpMobile {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .sticky-ad ins {
      width: 300px;
      height: 250px;
      transform: scale(0.533);
      transform-origin: top left;
      display: block;
    }

    .sticky-close {
      top: -8px;
      right: -8px;
    }
  }
</style>

<div class="sticky-ad" id="stickyAd">
  <button class="sticky-close"
    onclick="document.getElementById('stickyAd').remove()"
    title="Fechar">✕</button>

  <ins class="eas6a97888e17" data-zoneid="5929750"></ins>
</div>

<script>
  (AdProvider = window.AdProvider || []).push({"serve": {}});
</script>
