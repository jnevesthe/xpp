<style>
  .ads-wrapper {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    width: 100%;
    margin: 10px auto;
    padding: 0 8px;
    overflow: hidden;
    justify-items: center;
  }

  .ad-box {
    width: 82px;
    height: 68px;
    flex-shrink: 0;
    overflow: hidden;
    border-radius: 0;
  }

  .ad-box ins {
    width: 300px;
    height: 250px;
    transform: scale(0.273);
    transform-origin: top left;
    display: block;
  }

  @media (max-width: 700px) {
    .ad-box {
      width: 72px;
      height: 60px;
    }

    .ad-box ins {
      transform: scale(0.24);
    }
  }

  @media (max-width: 360px) {
    .ad-box {
      width: 64px;
      height: 53px;
    }

    .ad-box ins {
      transform: scale(0.213);
    }
  }
</style>

<div class="ads-wrapper" id="ads-lazy-wrapper">

  </div>
  <div class="ad-box">

<script>
  // Só carrega os scripts de anúncios quando a secção entra no ecrã (lazy load)
  function loadAdScripts() {
    var s1 = document.createElement('script');
    s1.src = 'https://a.magsrv.com/ad-provider.js';
    s1.async = true;
    s1.onload = function () {
      (window.AdProvider = window.AdProvider || []).push({"serve": {}});
    };
    document.body.appendChild(s1);

    var s2 = document.createElement('script');
    s2.src = 'https://poweredby.jads.co/js/jads.js';
    s2.async = true;
    s2.setAttribute('data-cfasync', 'false');
    s2.onload = function () {
      (window.adsbyjuicy = window.adsbyjuicy || []).push({'adzone': 1122016});
      (window.adsbyjuicy = window.adsbyjuicy || []).push({'adzone': 1122015});
    };
    document.body.appendChild(s2);
  }

  var adsWrapper = document.getElementById('ads-lazy-wrapper');
  if ('IntersectionObserver' in window) {
    var observer = new IntersectionObserver(function (entries, obs) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          loadAdScripts();
          obs.disconnect();
        }
      });
    }, { rootMargin: '200px' });
    observer.observe(adsWrapper);
  } else {
    loadAdScripts();
  }
</script>
